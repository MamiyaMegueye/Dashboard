# /etc/nginx/sites-available/releve.snde.local
#
# Reverse proxy NGINX pour le dashboard SNDE :
#   - /        -> Next.js (port 3000)
#   - /api/    -> FastAPI (port 8000)
#
# Activer :
#   sudo ln -s /etc/nginx/sites-available/releve.snde.local /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name releve.snde.local;

    # Logs dédiés (utile pour debug)
    access_log /var/log/nginx/releve.access.log;
    error_log  /var/log/nginx/releve.error.log;

    # --- FastAPI (lecture seule des marts DuckDB) ---
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /healthz {
        proxy_pass http://127.0.0.1:8000/healthz;
    }

    # --- Next.js dashboard ---
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
